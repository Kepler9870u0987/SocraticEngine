name: CI — Backend

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: socratic
          POSTGRES_PASSWORD: socratic_dev_pass
          POSTGRES_DB: socratic_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://socratic:socratic_dev_pass@localhost:5432/socratic_engine_test
          DATABASE_SYNC_URL: postgresql://socratic:socratic_dev_pass@localhost:5432/socratic_engine_test
          JWT_SECRET_KEY: test-secret-key-for-ci
          SECRET_KEY: test-secret-key-for-ci
          APP_ENV: test
        run: |
          pytest --cov=app --cov-report=term-missing -v
