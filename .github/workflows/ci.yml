name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: socratic
          POSTGRES_PASSWORD: socratic_test_pass
          POSTGRES_DB: socratic_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U socratic"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "postgresql+asyncpg://socratic:socratic_test_pass@localhost:5432/socratic_engine_test"
      DATABASE_SYNC_URL: "postgresql://socratic:socratic_test_pass@localhost:5432/socratic_engine_test"
      REDIS_URL: "redis://localhost:6379/0"
      SECRET_KEY: "ci-test-secret-key"
      JWT_SECRET_KEY: "ci-test-jwt-secret"
      ENCRYPTION_MASTER_KEY: "ci-test-encryption-key"
      APP_ENV: "test"
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --select E,W,F --ignore E501

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
